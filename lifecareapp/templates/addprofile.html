<!-- ======= Add Profile Page ======= -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Profile</title>
    {% load static %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(to right, #e3f2fd, #b2ebf2);
        }
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            background: #f0f0f0; /* Grey background */
        }
        .card:hover {
            transform: scale(1.05);
        }
        .card img {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .btn {
            background-color: #4ec4c4; 
            color: white;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #3ba3a3;
        }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="row w-75">
            <div class="col-md-6">
                <div class="card text-center p-4">
                    <img src="{% static 'assets/img/patientprofile.jpg' %}" alt="Patient Profile">
                    <h4 class="mt-3">Patient Profile</h4>
                    <p>Create and manage your patient profile.</p>
                    <a href="{% url 'patientform' %}" class="btn">Add Profile</a>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card text-center p-4">
                    <img src="{% static 'assets/img/doctorprofile.jpg' %}" alt="Doctor/Nurse Profile">
                    <h4 class="mt-3">Doctor/Nurse Profile</h4>
                    <p>Create and manage your professional profile.</p>
                    <a href="{% url 'doctorform' %}" class="btn">Add Profile</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
