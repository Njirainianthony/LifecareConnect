<!-- START OF doctorform.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Doctor Profile | Lifecare Connect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
  <link href="{% static 'assets/css/style.css' %}" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #e0f7fa, #e8f5e9);
      font-family: 'Poppins', sans-serif;
    }

    .profile-wrapper {
      margin-top: 120px;
      display: flex;
      justify-content: center;
      padding-bottom: 40px;
    }

    .profile-card {
      display: flex;
      width: 100%;
      max-width: 1400px;
      min-height: 600px;
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      flex-wrap: nowrap;
    }

    .form-side {
      flex: 1;
      padding: 40px;
    }

    .image-side {
      flex: 1;
      background-color: #d0ece7;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 0;
    }

    .image-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .form-title {
      color: #00796b;
      font-weight: bold;
      font-size: 26px;
      margin-bottom: 30px;
      text-align: center;
    }

    .btn-blue-green {
      background-color: #00796b;
      color: #fff;
      width: 100%;
    }

    .btn-blue-green:hover {
      background-color: #004d40;
    }

    .form-control:focus {
      border-color: #00796b;
      box-shadow: 0 0 0 0.2rem rgba(0,121,107,.25);
    }

    @media (max-width: 768px) {
      .profile-card {
        flex-direction: column;
      }

      .form-side, .image-side {
        flex: 1 1 100%;
      }
    }
  </style>
</head>
<body>

<div class="container profile-wrapper">
  <div class="profile-card">
    <!-- Form Side -->
    <div class="form-side">
      <h2 class="form-title">Doctor Profile Form</h2>
      <form method="POST" enctype="multipart/form-data" action="{% url 'doctorform' %}">
        {% csrf_token %}
        <div class="row">
          <div class="mb-3 col-md-6">
            <label for="full_name" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="full_name" name="full_name" required>
          </div>
          <div class="mb-3 col-md-6">
            <label for="professional_title" class="form-label">Professional Title</label>
            <input type="text" class="form-control" id="professional_title" name="professional_title" required>
          </div>
          <div class="mb-3 col-md-6">
            <label for="license_number" class="form-label">License Number</label>
            <input type="text" class="form-control" id="license_number" name="license_number" required>
          </div>
          <div class="mb-3 col-md-6">
            <label for="qualifications" class="form-label">Qualifications</label>
            <textarea class="form-control" id="qualifications" name="qualifications" rows="2"></textarea>
          </div>
          <div class="mb-3 col-md-6">
            <label for="expertise" class="form-label">Areas of Expertise</label>
            <textarea class="form-control" id="expertise" name="expertise" rows="2"></textarea>
          </div>
          <div class="mb-3 col-md-6">
            <label for="languages" class="form-label">Languages Spoken</label>
            <textarea class="form-control" id="languages" name="languages" rows="2"></textarea>
          </div>
          <div class="mb-3 col-md-6">
            <label for="available_location" class="form-label">Available Location</label>
            <input type="text" class="form-control" id="available_location" name="available_location" required>
          </div>
          <div class="mb-3 col-md-6">
            <label for="contact" class="form-label">Contact</label>
            <input type="text" class="form-control" id="contact" name="contact" required>
          </div>
          <div class="mb-3 col-md-6">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" required>
          </div>
          <div class="mb-3 col-md-6">
            <label for="charge_rates" class="form-label">Charge Rates</label>
            <input type="text" class="form-control" id="charge_rates" name="charge_rates">
          </div>
          <div class="mb-4 col-md-6">
            <label for="profile_pic" class="form-label">Upload Profile Picture</label>
            <input class="form-control" type="file" id="profile_pic" name="profile_pic" accept="image/*">
          </div>
        </div>

        <button type="submit" class="btn btn-blue-green mt-3">Submit Profile</button>
      </form>
    </div>

    <!-- Image Side -->
    <div class="image-side">
      <img src="{% static 'assets/img/Lifecare-Connect-Homecare-Logo-1.jpg' %}" alt="Lifecare Connect Logo">
    </div>
  </div>
</div>

<script src="{% static 'assets/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
<!-- END -->
