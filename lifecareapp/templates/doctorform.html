<!-- ======= Doctor/Nurse Profile Form ======= -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor/Nurse Profile Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(to right, #e3f2fd, #b2ebf2);
            font-family: 'Poppins', sans-serif;
        }
        .form-container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            margin: auto;
        }
        .form-header {
            text-align: center;
            font-weight: bold;
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
        }
        .btn-custom {
            background-color: #4ec4c4;
            color: white;
            transition: background-color 0.3s;
            width: 100%;
        }
        .btn-custom:hover {
            background-color: #3ba3a3;
        }
        .form-control {
            border-radius: 5px;
            padding-left: 40px;
        }
        .input-group-text {
            background: transparent;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="form-container">
            <div class="form-header">Doctor/Nurse Profile</div>
            <form>
                <div class="row">
                    <div class="col-md-6 mb-3 input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="fullName" placeholder="Full Name" required>
                    </div>
                    <div class="col-md-6 mb-3 input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="email" placeholder="Email" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3 input-group">
                        <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                        <input type="tel" class="form-control" id="phone" placeholder="Phone Number" required>
                    </div>
                    <div class="col-md-6 mb-3 input-group">
                        <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                        <input type="text" class="form-control" id="address" placeholder="Address" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3 input-group">
                        <span class="input-group-text"><i class="bi bi-map"></i></span>
                        <input type="text" class="form-control" id="county" placeholder="County" required>
                    </div>
                    <div class="col-md-6 mb-3 input-group">
                        <span class="input-group-text"><i class="bi bi-calendar"></i></span>
                        <input type="date" class="form-control" id="dob" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="gender" class="form-label">Gender</label>
                        <select class="form-control" id="gender" required>
                            <option value="">Select</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3 input-group">
                        <span class="input-group-text"><i class="bi bi-heart-pulse"></i></span>
                        <input type="text" class="form-control" id="specialization" placeholder="Specialization" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3 input-group">
                        <span class="input-group-text"><i class="bi bi-bar-chart"></i></span>
                        <input type="number" class="form-control" id="experience" min="0" placeholder="Years of Experience" required>
                    </div>
                    <div class="col-md-6 mb-3 input-group">
                        <span class="input-group-text"><i class="bi bi-clock"></i></span>
                        <input type="text" class="form-control" id="availability" placeholder="Availability (e.g. Weekdays 9 AM - 5 PM)" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="certifications" class="form-label">Certifications</label>
                    <textarea class="form-control" id="certifications" rows="3" required></textarea>
                </div>
                <div class="mb-3">
                    <label for="profilePicture" class="form-label">Upload Profile Picture</label>
                    <input type="file" class="form-control" id="profilePicture" accept="image/*" required>
                </div>
                <div class="mb-3 text-center">
                    <button type="submit" class="btn btn-custom">Submit</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
