
{% load static %}

<section id="login" class="login-section section-bg">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <script src="{% static 'js/bootstrap.min.js' %}"></script>
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
      <div class="card p-4" style="width: 350px;">
        <div class="section-title text-center">
          <h2>Login</h2>
        </div>
        <form>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="Enter your email">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter your password">
          </div>
          <div class="d-grid">
            <button type="submit" class="btn" style="background-color: #4ec4c4; color: white;">Login</button>
          </div>
          <div class="text-center mt-3">
            <a href="#" style="color: #4ec4c4;">Forgot Password?</a>
          </div>
          <div class="text-center mt-2">
            <span>Don't have an account? <a href="#" style="color: #4ec4c4;">Sign Up</a></span>
          </div>
        </form>
      </div>
    </div>
  </section>
