{% extends 'base.html' %}

{% load static %}

{% block title %} Sign Up {% endblock %}

{% block body %}
  <!-- ======= Signup Section ======= -->
  <div class="container signup-wrapper">
    <div class="signup-card">
      <!-- Form Side -->
      <div class="form-side">
        <h2 class="form-title text-center">Sign up now</h2>
        <form method="POST">
          {{ user_form.as_p }}
          {% csrf_token %}
          <button type="submit" class="btn btn-blue-green mt-2" value="Create my account">Create Account</button>
        </form>
        <hr class="my-4">
        <p class="text-center">or sign up with:</p>
        <div class="text-center social-icons">
          <i class="bi bi-facebook"></i>
          <i class="bi bi-google"></i>
          <i class="bi bi-twitter"></i>
          <i class="bi bi-github"></i>
        </div>
      </div>

      <!-- Logo Side -->
      <div class="image-side">
        <img src="{% static 'assets/img/Lifecare-Connect-Homecare-Logo-1.jpg' %}" alt="Lifecare Connect Logo">
      </div>
    </div>
  </div>

{% endblock %}
