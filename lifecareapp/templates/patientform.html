{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Patient Profile | Lifecare Connect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap & Icons -->
  <link href="{% static 'assets/vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
  <link href="{% static 'assets/vendor/bootstrap-icons/bootstrap-icons.css' %}" rel="stylesheet">
  <link href="{% static 'assets/css/style.css' %}" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, #e0f7fa, #e8f5e9);
      font-family: 'Poppins', sans-serif;
    }

    .profile-wrapper {
      margin-top: 120px;
      display: flex;
      justify-content: center;
      padding-bottom: 40px;
    }

    .profile-card {
      display: flex;
      width: 100%;
      max-width: 1400px; /* increased width */
      min-height: 600px; /* keeps both sides equal */
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      flex-wrap: nowrap;
    }

    .form-side {
      flex: 1;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .image-side {
      flex: 1;
      background-color: #d0ece7;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 0;
    }

    .image-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .form-title {
      color: #00796b;
      font-weight: bold;
      font-size: 26px;
      margin-bottom: 30px;
      text-align: center;
    }

    .btn-blue-green {
      background-color: #00796b;
      color: #fff;
      width: 100%;
    }

    .btn-blue-green:hover {
      background-color: #004d40;
    }

    .form-control:focus {
      border-color: #00796b;
      box-shadow: 0 0 0 0.2rem rgba(0,121,107,.25);
    }

    @media (max-width: 768px) {
      .profile-card {
        flex-direction: column;
      }

      .form-side, .image-side {
        flex: 1 1 100%;
      }
    }
  </style>
</head>

<body>

<div class="container profile-wrapper">
  <div class="profile-card">
    <!-- Form Side -->
    <div class="form-side">
      <h2 class="form-title">Patient Profile Form</h2>
      <form method="POST" enctype="multipart/form-data" action="{% url 'patientform' %}">
        {% csrf_token %}
        <div class="row">
          <!-- Full Name -->
          <div class="mb-3 col-md-6">
            <label for="fullname" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="fullname" name="fullname" required>
          </div>

          <!-- Phone Number -->
          <div class="mb-3 col-md-6">
            <label for="phone" class="form-label">Phone Number</label>
            <input type="tel" class="form-control" id="phone" name="phone" required>
          </div>

          <!-- Email -->
          <div class="mb-3 col-md-6">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" name="email" required>
          </div>

          <!-- Address -->
          <div class="mb-3 col-md-6">
            <label for="address" class="form-label">Address</label>
            <input type="text" class="form-control" id="address" name="address" required>
          </div>

          <!-- Gender -->
          <div class="mb-3 col-md-6">
            <label for="gender" class="form-label">Gender</label>
            <select class="form-select" id="gender" name="gender" required>
              <option selected disabled>Choose...</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>

          <!-- County -->
          <div class="mb-3 col-md-6">
            <label for="county" class="form-label">County</label>
            <select class="form-select" id="county" name="county" required>
              <option selected disabled>Choose...</option>
              <option>Nairobi</option>
              <option>Kisumu</option>
              <option>Mombasa</option>
              <option>Nakuru</option>
              <option>Kiambu</option>
              <option>Machakos</option>
              <!-- Add more counties as needed -->
            </select>
          </div>

          <!-- Date of Birth -->
          <div class="mb-3 col-md-6">
            <label for="dob" class="form-label">Date of Birth</label>
            <input type="date" class="form-control" id="dob" name="dob">
          </div>

          <!-- Emergency Contact -->
          <div class="mb-3 col-md-6">
            <label for="emergency" class="form-label">Emergency Contact</label>
            <input type="text" class="form-control" id="emergency" name="emergency">
          </div>

          <!-- Medical Conditions -->
          <div class="mb-3 col-md-6">
            <label for="conditions" class="form-label">Medical Conditions</label>
            <textarea class="form-control" id="conditions" name="conditions" rows="2"></textarea>
          </div>

          <!-- Allergies -->
          <div class="mb-3 col-md-6">
            <label for="allergies" class="form-label">Allergies</label>
            <textarea class="form-control" id="allergies" name="allergies" rows="2"></textarea>
          </div>

          <!-- Preferred Care Type -->
          <div class="mb-3 col-md-6">
            <label for="caretype" class="form-label">Preferred Care Type</label>
            <select class="form-select" id="caretype" name="caretype">
              <option selected disabled>Choose...</option>
              <option>Elderly Care</option>
              <option>Post-Surgery Care</option>
              <option>Chronic Condition Management</option>
              <option>Disability Support</option>
            </select>
          </div>

          <!-- Profile Picture -->
          <div class="mb-4 col-md-6">
            <label for="profilepic" class="form-label">Upload Profile Picture</label>
            <input class="form-control" type="file" id="profilepic" name="profilepic" accept="image/*">
          </div>
        </div>

        <button type="submit" class="btn btn-blue-green mt-3">Submit Profile</button>
      </form>
    </div>

    <!-- Image Side -->
    <div class="image-side">
      <img src="{% static 'assets/img/Lifecare-Connect-Homecare-Logo-1.jpg' %}" alt="Lifecare Connect Logo">
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="{% static 'assets/vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
